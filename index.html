<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dominando Claude · Guía Biosteel de Colombia</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="guia/styles.css" />
<style>
  /* component-specific responsive */
  @media (max-width: 900px){
    .hero-cols{grid-template-columns:1fr !important;}
    .hero-card{display:none;}
    .rec-cols{grid-template-columns:1fr !important;}
    .rec-cols > div:last-child{position:static !important;}
    .mod-rows{grid-template-columns:1fr !important;}
    .mod-rows button{border-right:none !important;}
  }
  /* loading splash */
  #splash{position:fixed;inset:0;display:grid;place-items:center;background:#203562;z-index:999;transition:opacity .4s;}
  #splash.hide{opacity:0;pointer-events:none;}
  #splash .s-in{text-align:center;color:#fff;}
  #splash .dots{display:flex;gap:7px;justify-content:center;margin-top:18px;}
  #splash .dots i{width:9px;height:9px;border-radius:50%;background:#7fb2f0;animation:bb 1s infinite ease-in-out;}
  #splash .dots i:nth-child(2){animation-delay:.15s;}
  #splash .dots i:nth-child(3){animation-delay:.3s;}
  @keyframes bb{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div id="splash"><div class="s-in">
  <img src="assets/Logo_Biosteel.png" style="height:52px;filter:brightness(0) invert(1);opacity:.95" alt="Biosteel" />
  <div style="font-weight:900;font-size:22px;letter-spacing:-.01em;margin-top:18px;">Dominando Claude</div>
  <div class="dots"><i></i><i></i><i></i></div>
</div></div>

<div id="app"></div>

<!-- React + Babel (pinned) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Data (plain global) -->
<script src="guia/data.js"></script>

<!-- App scripts (transpiled) -->
<script type="text/babel" src="guia/components.jsx"></script>
<script type="text/babel" src="guia/views_core.jsx"></script>
<script type="text/babel" src="guia/views_more.jsx"></script>
<script type="text/babel" src="guia/recetario.jsx"></script>
<script type="text/babel" src="guia/deck.jsx"></script>
<script type="text/babel" src="guia/views_eval.jsx"></script>
<script type="text/babel" src="guia/app.jsx"></script>

<script>
  // hide splash once React has painted
  (function(){
    var tries=0;
    var iv=setInterval(function(){
      tries++;
      if(document.querySelector('#app').children.length>0 || tries>40){
        var s=document.getElementById('splash'); if(s) s.classList.add('hide');
        setTimeout(function(){ if(s&&s.parentNode) s.parentNode.removeChild(s); },500);
        clearInterval(iv);
      }
    },120);
  })();
</script>
</body>
</html>
